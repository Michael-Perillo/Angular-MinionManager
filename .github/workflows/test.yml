name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:ci

      - name: Check core coverage thresholds
        run: npm run coverage:check:core

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-karma
          path: coverage/angular-minionmanager/

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  storybook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Serve Storybook
        run: npx http-server storybook-static --port 6006 --silent &

      - name: Wait for Storybook
        run: npx wait-on http://localhost:6006 --timeout 30000

      - name: Install Playwright for test-runner
        run: npx playwright install chromium --with-deps

      - name: Run Storybook tests
        run: npx test-storybook --url http://localhost:6006 --coverage --coverageDirectory coverage/storybook

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-storybook
          path: coverage/storybook/

  coverage-gate:
    runs-on: ubuntu-latest
    needs: [unit-tests, storybook-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download Karma coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-karma
          path: coverage/angular-minionmanager/

      - name: Download Storybook coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-storybook
          path: coverage/storybook/

      - name: Merge coverage
        run: npm run coverage:merge

      - name: Check merged coverage thresholds
        run: npm run coverage:check

      - name: Generate merged report
        run: npm run coverage:report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-merged
          path: coverage/merged/
